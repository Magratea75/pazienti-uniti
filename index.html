<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Pazienti Uniti</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<h1>PAZIENTI UNITI</h1>
<p>Nasciamo insieme. Cresciamo per difendere i pazienti.</p>

<h3>Contatti</h3>
<p>Telefono: 3899728973</p>

<hr>

<!-- ADESIONE -->
<h3>Aderisci</h3>

<form id="adesioneForm">

<input type="text" id="nome" placeholder="Nome completo" required><br><br>

<input type="text" id="telefono" placeholder="Telefono (facoltativo)"><br><br>

<input type="email" id="email" placeholder="Email (facoltativa)"><br><br>

<textarea id="motivazione" placeholder="Perché vuoi aderire?" required></textarea><br><br>

<input type="checkbox" id="privacy" required>
<label>
Accetto la <a href="privacy.html" target="_blank">Privacy Policy</a>
</label><br><br>

<input type="checkbox" id="newsletter">
<label>
Voglio ricevere aggiornamenti e petizioni via email
</label><br><br>

<button type="submit">Invia adesione</button>

</form>

<hr>

<!-- SEGNALAZIONE -->
<h3>Invia segnalazione</h3>

<form id="segnalazioneForm">

<input type="text" id="segnalazione_nome" placeholder="Nome (facoltativo)"><br><br>

<input type="email" id="segnalazione_email" placeholder="Email (facoltativa)"><br><br>

<textarea id="segnalazione_testo" placeholder="Scrivi la tua segnalazione" required></textarea><br><br>

<input type="checkbox" id="privacy2" required>
<label>
Accetto la <a href="privacy.html" target="_blank">Privacy Policy</a>
</label><br><br>

<button type="submit">Invia segnalazione</button>

</form>

<hr>

<!-- CONTATTI -->
<h3>Contattaci</h3>

<form id="contattiForm">

<input type="text" id="contatto_nome" placeholder="Nome"><br><br>

<input type="email" id="contatto_email" placeholder="Email"><br><br>

<textarea id="contatto_messaggio" placeholder="Messaggio" required></textarea><br><br>

<input type="checkbox" id="privacy3" required>
<label>
Accetto la <a href="privacy.html" target="_blank">Privacy Policy</a>
</label><br><br>

<button type="submit">Invia messaggio</button>

</form>

<hr>

<a href="privacy.html">Leggi la Privacy Policy</a>

<script>

const supabase = window.supabase.createClient(
  "https://zotvssrajgieftxobezm.supabase.co",
  "sb_publishable_OtDmvCSsdDFuZPhtOvpEFA_4QYdiqgv"
);


// ADESIONE
document.getElementById("adesioneForm").addEventListener("submit", async (e) => {
e.preventDefault();

const nome = document.getElementById("nome").value;
const telefono = document.getElementById("telefono").value;
const email = document.getElementById("email").value;
const motivazione = document.getElementById("motivazione").value;
const newsletter = document.getElementById("newsletter").checked;

const { error } = await supabase.from("membership_requests").insert([
{
nome: nome,
telefono: telefono || null,
email: email || null,
motivazione: motivazione,
newsletter: newsletter
}
]);

if (error) {
alert("Errore invio");
} else {
alert("Adesione inviata!");
}
});


// SEGNALAZIONI
document.getElementById("segnalazioneForm").addEventListener("submit", async (e) => {
e.preventDefault();

const nome = document.getElementById("segnalazione_nome").value;
const email = document.getElementById("segnalazione_email").value;
const testo = document.getElementById("segnalazione_testo").value;

const { error } = await supabase.from("report").insert([
{
nome: nome || null,
email: email || null,
testo: testo
}
]);

if (error) {
alert("Errore invio");
} else {
alert("Segnalazione inviata!");
}
});


// CONTATTI
document.getElementById("contattiForm").addEventListener("submit", async (e) => {
e.preventDefault();

const nome = document.getElementById("contatto_nome").value;
const email = document.getElementById("contatto_email").value;
const messaggio = document.getElementById("contatto_messaggio").value;

const { error } = await supabase.from("portal_messages").insert([
{
nome: nome || null,
email: email || null,
messaggio: messaggio
}
]);

if (error) {
alert("Errore invio");
} else {
alert("Messaggio inviato!");
}
});

</script>

</body>
</html>
